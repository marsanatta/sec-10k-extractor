<svg xmlns="http://www.w3.org/2000/svg" width="820" height="600" viewBox="0 0 820 600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>The Verification Stack: independent checks run in parallel, bar length is coverage</title>
  <desc>Five independent verification checks, each independent of the production segmenter, drawn as left-aligned horizontal bars whose length shows how much each covers (100% of filings down to 6 hand-audited filings). The checks run in parallel, not as a funnel or sieve. Result: silent-failure 0 of 27.</desc>

  <rect x="8" y="8" width="804" height="584" rx="14" fill="#f8fafc" fill-opacity="0.9" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Header -->
  <text x="410" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f766e">The Verification Stack</text>
  <text x="410" y="62" text-anchor="middle" font-size="13" fill="#64748b">independent checks, run in parallel &#8212; bar length &#8776; how much each one covers</text>

  <!-- Independence banner -->
  <rect x="40" y="78" width="740" height="42" rx="8" fill="#0f766e" fill-opacity="0.10" stroke="#0f766e" stroke-width="1.5"/>
  <text x="410" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f766e">&#9888;  self-consistency is not validation</text>
  <text x="410" y="113" text-anchor="middle" font-size="12" fill="#334155">every check below is INDEPENDENT of the production segmenter &#8212; none reuses its logic</text>

  <!-- Column headers -->
  <text x="30" y="150" font-size="11" font-weight="600" fill="#94a3b8">CHECK  (cheap &#8594; expensive)</text>
  <text x="330" y="150" font-size="11" font-weight="600" fill="#94a3b8">COVERAGE &#8594;</text>

  <!-- Row 1 -->
  <rect x="330" y="166" width="430" height="28" rx="6" fill="#e2e8f0" fill-opacity="0.7"/>
  <rect x="330" y="166" width="430" height="28" rx="6" fill="#0f766e"/>
  <circle cx="34" cy="180" r="13" fill="#0f766e"/>
  <text x="34" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">1</text>
  <text x="56" y="176" font-size="13.5" font-weight="700" fill="#334155">Structural + round-trip</text>
  <text x="56" y="192" font-size="10.5" fill="#64748b">geometry, label-free &#183; free, runs on all</text>
  <text x="748" y="185" text-anchor="end" font-size="11.5" font-weight="700" fill="#f8fafc">100% &#183; every item</text>

  <!-- Row 2 -->
  <rect x="330" y="244" width="430" height="28" rx="6" fill="#e2e8f0" fill-opacity="0.7"/>
  <rect x="330" y="244" width="300" height="28" rx="6" fill="#0d9488"/>
  <circle cx="34" cy="258" r="13" fill="#0d9488"/>
  <text x="34" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">2</text>
  <text x="56" y="254" font-size="13.5" font-weight="700" fill="#334155">Second-extractor cross-check</text>
  <text x="56" y="270" font-size="10.5" fill="#64748b">edgartools parse &#183; cheap</text>
  <text x="618" y="263" text-anchor="end" font-size="11" font-weight="700" fill="#f8fafc">big items, well-formed</text>

  <!-- Row 3 -->
  <rect x="330" y="322" width="430" height="28" rx="6" fill="#e2e8f0" fill-opacity="0.7"/>
  <rect x="330" y="322" width="75" height="28" rx="6" fill="#b45309"/>
  <circle cx="34" cy="336" r="13" fill="#b45309"/>
  <text x="34" y="341" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">3</text>
  <text x="56" y="332" font-size="13.5" font-weight="700" fill="#334155">Char-exact boundary gold</text>
  <text x="56" y="348" font-size="10.5" fill="#64748b">human-audited offsets &#183; expensive</text>
  <text x="413" y="341" font-size="11.5" font-weight="700" fill="#334155">6 hand-audited filings</text>

  <!-- Row 4 -->
  <rect x="330" y="400" width="430" height="28" rx="6" fill="#e2e8f0" fill-opacity="0.7"/>
  <rect x="330" y="400" width="130" height="28" rx="6" fill="#d97706"/>
  <circle cx="34" cy="414" r="13" fill="#d97706"/>
  <text x="34" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">4</text>
  <text x="56" y="410" font-size="13.5" font-weight="700" fill="#334155">XBRL Item-8 oracle</text>
  <text x="56" y="426" font-size="10.5" fill="#64748b">SEC companyfacts &#183; external data</text>
  <text x="468" y="419" font-size="11.5" font-weight="700" fill="#334155">filings with XBRL Item 8</text>

  <!-- Row 5 -->
  <rect x="330" y="478" width="430" height="28" rx="6" fill="#e2e8f0" fill-opacity="0.7"/>
  <rect x="330" y="478" width="100" height="28" rx="6" fill="#0891b2"/>
  <circle cx="34" cy="492" r="13" fill="#0891b2"/>
  <text x="34" y="497" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">5</text>
  <text x="56" y="488" font-size="13.5" font-weight="700" fill="#334155">Decorrelated 3rd extractor</text>
  <text x="56" y="504" font-size="10.5" fill="#64748b">edgar-corpus &#183; on-demand</text>
  <text x="438" y="497" font-size="11.5" font-weight="700" fill="#334155">1993&#8211;2020 sample</text>

  <!-- parallel note -->
  <text x="410" y="528" text-anchor="middle" font-size="10.5" font-style="italic" fill="#94a3b8">left-aligned bars = each check runs on its own slice, in parallel &#8212; not a funnel an item falls through</text>

  <!-- Result callout -->
  <rect x="270" y="540" width="280" height="44" rx="12" fill="#0f766e" stroke="#0f766e" stroke-width="2"/>
  <text x="410" y="559" text-anchor="middle" font-size="11" fill="#a7f3d0">result across all checks</text>
  <text x="410" y="578" text-anchor="middle" font-size="18" font-weight="800" fill="#f8fafc">silent-failure  0 / 27</text>
</svg>
