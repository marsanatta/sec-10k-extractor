<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>The Verification Stack: independent checks, cheap and wide to expensive and narrow</title>
  <desc>Five tiers of verification, each independent of the production segmenter, ordered from widest cheapest scope at the top to narrowest most expensive at the bottom. Result: silent-failure 0 of 27.</desc>

  <!-- background (transparent so it works on light + dark; no white fill) -->

  <!-- ===== Header ===== -->
  <text x="410" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f766e">The Verification Stack</text>
  <text x="410" y="58" text-anchor="middle" font-size="13" fill="#64748b">layered independent checks &#8212; cheap + wide  &#8594;  expensive + narrow</text>

  <!-- ===== Independence banner ===== -->
  <rect x="40" y="74" width="740" height="40" rx="8" fill="#0f766e" fill-opacity="0.10" stroke="#0f766e" stroke-width="1.5"/>
  <text x="410" y="92" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f766e">&#9888;  self-consistency is not validation</text>
  <text x="410" y="108" text-anchor="middle" font-size="12.5" fill="#334155">every layer below is INDEPENDENT of the production segmenter</text>

  <!-- scope-axis labels -->
  <text x="56" y="146" font-size="11" font-weight="600" fill="#94a3b8">WIDEST &#183; CHEAPEST</text>
  <text x="764" y="146" text-anchor="end" font-size="11" font-weight="600" fill="#94a3b8">SCOPE &#8595;</text>

  <!-- ===== Tier 1 ===== widest -->
  <rect x="60" y="154" width="700" height="64" rx="9" fill="#0f766e" fill-opacity="0.14" stroke="#0f766e" stroke-width="1.5"/>
  <circle cx="92" cy="186" r="13" fill="#0f766e"/>
  <text x="92" y="191" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">1</text>
  <text x="118" y="180" font-size="14.5" font-weight="700" fill="#0f5f59">Structural invariants + round-trip</text>
  <text x="118" y="198" font-size="11.5" fill="#475569">non-overlap &#183; full coverage &#183; byte-exact reconstruction &#183; label-free</text>
  <rect x="612" y="170" width="132" height="32" rx="16" fill="#0f766e"/>
  <text x="678" y="190" text-anchor="middle" font-size="11.5" font-weight="700" fill="#f8fafc">100% of filings</text>

  <!-- ===== Tier 2 ===== -->
  <rect x="100" y="230" width="620" height="64" rx="9" fill="#0d9488" fill-opacity="0.16" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="132" cy="262" r="13" fill="#0d9488"/>
  <text x="132" y="267" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">2</text>
  <text x="158" y="256" font-size="14.5" font-weight="700" fill="#0b6b62">Second-extractor cross-check</text>
  <text x="158" y="274" font-size="11.5" fill="#475569">independent parser (edgartools) agrees on item boundaries</text>
  <rect x="572" y="246" width="136" height="32" rx="16" fill="#0d9488"/>
  <text x="640" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc">big items, well-formed</text>

  <!-- ===== Tier 3 ===== -->
  <rect x="140" y="306" width="540" height="64" rx="9" fill="#0891b2" fill-opacity="0.16" stroke="#0891b2" stroke-width="1.5"/>
  <circle cx="172" cy="338" r="13" fill="#0891b2"/>
  <text x="172" y="343" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">3</text>
  <text x="198" y="332" font-size="14.5" font-weight="700" fill="#0a6f87">Char-exact boundary gold</text>
  <text x="198" y="350" font-size="11.5" fill="#475569">human-audited offsets &#183; IoU &#8805; 0.9 (mean 0.996&#8211;1.000)</text>
  <rect x="540" y="322" width="120" height="32" rx="16" fill="#0891b2"/>
  <text x="600" y="342" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc">6 audited filings</text>

  <!-- ===== Tier 4 ===== -->
  <rect x="180" y="382" width="460" height="64" rx="9" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="212" cy="414" r="13" fill="#d97706"/>
  <text x="212" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">4</text>
  <text x="238" y="408" font-size="14.5" font-weight="700" fill="#a85a05">XBRL Item-8 oracle</text>
  <text x="238" y="426" font-size="11.5" fill="#475569">independent data source &#183; SEC companyfacts</text>
  <rect x="512" y="398" width="116" height="32" rx="16" fill="#d97706"/>
  <text x="570" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc">external facts</text>

  <!-- ===== Tier 5 ===== narrowest -->
  <rect x="220" y="458" width="380" height="64" rx="9" fill="#b45309" fill-opacity="0.18" stroke="#b45309" stroke-width="1.5"/>
  <circle cx="252" cy="490" r="13" fill="#b45309"/>
  <text x="252" y="495" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">5</text>
  <text x="278" y="484" font-size="14.5" font-weight="700" fill="#8a4007">Decorrelated 3rd extractor</text>
  <text x="278" y="502" font-size="11.5" fill="#475569">edgar-corpus &#183; breaks shared header-parser blind spot</text>

  <!-- narrowing guide arrow on the left -->
  <line x1="44" y1="158" x2="44" y2="518" stroke="#cbd5e1" stroke-width="1.5"/>
  <polygon points="44,524 40,514 48,514" fill="#cbd5e1"/>
  <text x="34" y="345" text-anchor="middle" font-size="10.5" font-weight="600" fill="#94a3b8" transform="rotate(-90 34 345)">narrower scope &#183; higher cost</text>

  <!-- ===== Result callout ===== -->
  <rect x="240" y="554" width="340" height="56" rx="12" fill="#0f766e" stroke="#0f766e" stroke-width="2"/>
  <text x="410" y="578" text-anchor="middle" font-size="13" font-weight="600" fill="#a7f3d0">result across all layers</text>
  <text x="410" y="600" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">silent-failure  0 / 27</text>
</svg>
